<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>VARK 词汇学习推荐助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f7f4 0%, #e3eee8 50%, #d5e8e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 背景装饰 */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 20% 50%, rgba(30,111,92,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 50%, rgba(40,150,114,0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 
                0 30px 80px -20px rgba(0, 0, 0, 0.12),
                0 8px 24px -8px rgba(0, 0, 0, 0.04),
                inset 0 1px 0 rgba(255,255,255,0.6);
            padding: 48px 44px;
            max-width: 780px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-primary {
            background: linear-gradient(135deg, #1a6b58 0%, #2a9d7a 100%);
            color: white;
            padding: 16px 52px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            cursor: pointer;
            display: inline-block;
            text-decoration: none;
            box-shadow: 0 8px 28px -6px rgba(30, 111, 92, 0.35);
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
            pointer-events: none;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 14px 40px -8px rgba(30, 111, 92, 0.45);
        }

        .btn-primary:active {
            transform: scale(0.97);
        }

        .tag {
            background: rgba(30, 111, 92, 0.08);
            color: #1a6b58;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            display: inline-block;
            border: 1px solid rgba(30, 111, 92, 0.06);
            backdrop-filter: blur(4px);
        }

        .stat-card {
            background: rgba(255,255,255,0.5);
            border-radius: 16px;
            padding: 12px 18px;
            border: 1px solid rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: #1a2c3e;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 640px) {
            .glass-card { padding: 32px 20px; border-radius: 28px; }
            .btn-primary { padding: 14px 36px; font-size: 0.95rem; width: 100%; text-align: center; }
            .stat-card { font-size: 0.8rem; padding: 8px 14px; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- 装饰图标 -->
        <div style="display: flex; justify-content: center; margin-bottom: 4px;">
            <div style="font-size: 3.6rem; line-height: 1; filter: drop-shadow(0 4px 12px rgba(30,111,92,0.15));">📘</div>
        </div>

        <!-- 标题 -->
        <h1 style="font-size: 2rem; font-weight: 800; color: #0f2b22; text-align: center; letter-spacing: -0.02em; margin-top: 4px;">
            VARK 词汇学习推荐助手
        </h1>
        <p style="color: #4a6a5a; font-size: 1.05rem; text-align: center; margin-top: 6px; font-weight: 400; max-width: 440px; margin-left: auto; margin-right: auto;">
            找到最适合你的背单词软件和科学学习计划
        </p>

        <!-- 统计标签 -->
        <div style="display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 24px 0 32px;">
            <span class="tag">📊 500+ 学习者数据</span>
            <span class="tag">📱 4 款主流 App 对比</span>
            <span class="tag">⏱️ 3 分钟完成</span>
        </div>

        <!-- 数据亮点 -->
        <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 32px; max-width: 560px; margin-left: auto; margin-right: auto;">
            <div class="stat-card" style="justify-content: center;">
                <span style="font-weight:700;color:#1a6b58;">r=0.08</span>
                <span style="color:#4a6a5a;font-size:0.75rem;">参与度最强</span>
            </div>
            <div class="stat-card" style="justify-content: center;">
                <span style="font-weight:700;color:#1a6b58;">3-6x</span>
                <span style="color:#4a6a5a;font-size:0.75rem;">阅读最佳</span>
            </div>
            <div class="stat-card" style="justify-content: center;">
                <span style="font-weight:700;color:#1a6b58;">👂</span>
                <span style="color:#4a6a5a;font-size:0.75rem;">听觉型最优</span>
            </div>
        </div>

        <!-- 按钮 -->
        <div style="text-align: center;">
            <a href="quiz.html" class="btn-primary">✨ 开始测评</a>
        </div>

        <p style="font-size: 0.7rem; color: #8aa69a; text-align: center; margin-top: 20px; letter-spacing: 0.3px;">
            基于 VARK 学习风格模型 · 数据驱动推荐
        </p>
    </div>
</body>
</html>
