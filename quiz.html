<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>VARK 风格测评</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f7f4 0%, #e3eee8 50%, #d5e8e0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.78);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 30px 80px -20px rgba(0, 0, 0, 0.12), 0 8px 24px -8px rgba(0, 0, 0, 0.04), inset 0 1px 0 rgba(255,255,255,0.6);
            padding: 40px 36px;
            max-width: 780px;
            width: 100%;
            border: 1px solid rgba(255, 255, 255, 0.5);
            min-height: 480px;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .question-text {
            font-weight: 600;
            font-size: 1.15rem;
            color: #0f2b22;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .option {
            background: rgba(255, 255, 255, 0.5);
            border: 1.5px solid rgba(200, 215, 208, 0.4);
            border-radius: 16px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 500;
            color: #1a2c3e;
            margin-bottom: 10px;
            backdrop-filter: blur(4px);
        }

        .option:hover {
            border-color: #2a9d7a;
            background: rgba(40, 150, 114, 0.06);
            transform: translateX(4px);
        }

        .option.selected {
            border-color: #1a6b58;
            background: rgba(30, 111, 92, 0.10);
            box-shadow: 0 2px 16px rgba(30, 111, 92, 0.10);
        }

        .option .radio {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid #c8d7d0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s;
        }

        .option.selected .radio {
            border-color: #1a6b58;
            background: #1a6b58;
        }

        .option.selected .radio::after {
            content: '✓';
            color: white;
            font-size: 12px;
            font-weight: 700;
        }

        .option .emoji { font-size: 1.2rem; flex-shrink: 0; }

        .btn-primary {
            background: linear-gradient(135deg, #1a6b58 0%, #2a9d7a 100%);
            color: white;
            padding: 12px 36px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px -6px rgba(30, 111, 92, 0.3);
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -8px rgba(30, 111, 92, 0.4); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-outline {
            background: transparent;
            color: #1a6b58;
            border: 1.5px solid rgba(30, 111, 92, 0.2);
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .btn-outline:hover { background: rgba(30, 111, 92, 0.06); border-color: #1a6b58; }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(200, 215, 208, 0.4);
            border-radius: 4px;
            margin-bottom: 28px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #1a6b58, #2a9d7a);
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .counter-badge {
            background: rgba(30, 111, 92, 0.08);
            padding: 4px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #1a6b58;
            font-weight: 500;
        }

        .fade-enter {
            animation: fadeSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 640px) {
            .glass-card { padding: 28px 18px; border-radius: 28px; min-height: 400px; }
            .question-text { font-size: 1rem; }
            .option { padding: 12px 14px; font-size: 0.9rem; }
            .btn-primary { padding: 10px 28px; font-size: 0.9rem; width: 100%; }
            .btn-outline { padding: 10px 20px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <!-- 头部 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
            <h2 style="font-size: 1.2rem; font-weight: 700; color: #0f2b22;">🔍 学习风格测评</h2>
            <span class="counter-badge" id="quizCounter">第 1/5 题</span>
        </div>

        <!-- 进度条 -->
        <div class="progress-bar">
            <div class="progress-fill" id="quizProgress" style="width: 0%;"></div>
        </div>

        <!-- 题目容器 -->
        <div id="questionsContainer" class="fade-enter"></div>

        <!-- 底部按钮 -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 28px; gap: 12px; flex-wrap: wrap;">
            <button class="btn-outline" id="resetBtn">↺ 重选</button>
            <button class="btn-primary" id="submitBtn">📊 查看结果</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                text: "当你学习一个新单词时，哪种方式对你最有效？",
                options: [
                    { text: "看一张图片或图表", style: "V", emoji: "📊" },
                    { text: "听它的发音和例句", style: "A", emoji: "🎧" },
                    { text: "阅读它的定义和例句", style: "R", emoji: "📖" },
                    { text: "用手写出来或拖拽拼写", style: "K", emoji: "✍️" }
                ]
            },
            {
                text: "你更喜欢用哪种材料来学习单词？",
                options: [
                    { text: "图表、思维导图", style: "V", emoji: "📈" },
                    { text: "音频课程、播客", style: "A", emoji: "🎙️" },
                    { text: "文本、列表、笔记", style: "R", emoji: "📄" },
                    { text: "互动练习、动手操作", style: "K", emoji: "🎮" }
                ]
            },
            {
                text: "为了记住一个单词，你通常会：",
                options: [
                    { text: "在脑海中想象它的样子", style: "V", emoji: "🧠" },
                    { text: "大声重复读几遍", style: "A", emoji: "🗣️" },
                    { text: "写几个例句", style: "R", emoji: "✏️" },
                    { text: "一边背一边走动或做手势", style: "K", emoji: "🚶" }
                ]
            },
            {
                text: "哪种学习环境让你效率最高？",
                options: [
                    { text: "看信息图或幻灯片", style: "V", emoji: "📊" },
                    { text: "听老师讲解或讨论", style: "A", emoji: "👥" },
                    { text: "自己看书或做笔记", style: "R", emoji: "📚" },
                    { text: "做实验或角色扮演", style: "K", emoji: "⚙️" }
                ]
            },
            {
                text: "复习单词时，你更倾向于：",
                options: [
                    { text: "看带图片的闪卡", style: "V", emoji: "🃏" },
                    { text: "听单词和例句录音", style: "A", emoji: "🔊" },
                    { text: "看文字版的单词列表", style: "R", emoji: "📑" },
                    { text: "做拖拽配对、拼写小游戏", style: "K", emoji: "🎯" }
                ]
            }
        ];

        let answers = new Array(questions.length).fill(null);
        let currentIndex = 0;

        function renderQuestion() {
            const q = questions[currentIndex];
            const selected = answers[currentIndex];
            let html = `<div class="question-text">${currentIndex+1}. ${q.text}</div>`;

            q.options.forEach(opt => {
                const isSelected = selected === opt.style;
                html += `
                    <div class="option ${isSelected ? 'selected' : ''}" data-style="${opt.style}">
                        <div class="radio"></div>
                        <span class="emoji">${opt.emoji}</span>
                        <span>${opt.text}</span>
                    </div>
                `;
            });

            const container = document.getElementById('questionsContainer');
            container.innerHTML = html;
            container.className = 'fade-enter';
            void container.offsetWidth; // 触发重排
            container.className = 'fade-enter';

            document.querySelectorAll('.option').forEach(el => {
                el.addEventListener('click', function() {
                    const style = this.dataset.style;
                    answers[currentIndex] = style;
                    renderQuestion();

                    if (currentIndex < questions.length - 1) {
                        setTimeout(() => {
                            currentIndex++;
                            updateProgress();
                            renderQuestion();
                        }, 300);
                    }
                });
            });

            updateProgress();
        }

        function updateProgress() {
            document.getElementById('quizCounter').textContent = `第 ${currentIndex+1}/${questions.length} 题`;
            document.getElementById('quizProgress').style.width = `${((currentIndex+1)/questions.length)*100}%`;
        }

        function computeStyle() {
            const scores = { V: 0, A: 0, R: 0, K: 0 };
            answers.forEach(a => { if (a) scores[a]++; });
            const sorted = Object.entries(scores).sort((a,b) => b[1] - a[1]);
            return { primary: sorted[0][0], secondary: sorted[1][0] };
        }

        function getRecommendation(primary) {
            const map = {
                'V': { primary: "百词斩", alternatives: ["不背单词", "扇贝"], reason: "图文联想匹配视觉偏好" },
                'A': { primary: "不背单词", alternatives: ["扇贝", "百词斩"], reason: "150万+ 原声例句" },
                'R': { primary: "扇贝", alternatives: ["墨墨", "不背单词"], reason: "强制拼写+大量阅读材料" },
                'K': { primary: "墨墨 + 手写补充", alternatives: ["扇贝"], reason: "主动召回机制，建议配合手写练习" }
            };
            return map[primary] || map['R'];
        }

        function generatePlan(primary) {
            const styleNames = { V: "视觉型", A: "听觉型", R: "读写型", K: "动觉型" };
            const tips = {
                'V': "🎨 使用百词斩图片联想，自己画单词思维导图，多利用色彩标记",
                'A': "🎧 每天跟读原声例句，尝试听写练习，利用碎片时间听单词音频",
                'R': "📚 坚持做笔记、写例句，使用扇贝的拼写模式，整理错词文档",
                'K': "✍️ 手写单词，利用墨墨主动召回，尝试拖拽配对类小游戏或写便签贴"
            };
            return {
                reading: "每周 3-6 次，每次 10 分钟",
                duration: "每次 30-45 分钟",
                engagement: "每天至少 2 个深度活动（跟读、听写、造句、拼写）",
                error: "错误率 > 30% 时，先复习错词再学新词",
                tip: tips[primary] || tips['R'],
                styleName: styleNames[primary] || "综合型"
            };
        }

        document.getElementById('submitBtn').addEventListener('click', function() {
            if (answers.some(a => a === null)) {
                alert('请完成所有题目后再提交 🧐');
                return;
            }
            const style = computeStyle();
            const rec = getRecommendation(style.primary);
            const plan = generatePlan(style.primary);
            localStorage.setItem('varkResult', JSON.stringify({ style, rec, plan }));
            window.location.href = 'result.html';
        });

        document.getElementById('resetBtn').addEventListener('click', function() {
            answers.fill(null);
            currentIndex = 0;
            renderQuestion();
        });

        renderQuestion();
    </script>
</body>
</html>
